services:
  - type: web
    name: saoluis-fidelidade
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --preload
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: saoluis-db
          property: connectionString
      - key: ZAPI_INSTANCE
        value: ""
      - key: ZAPI_TOKEN
        value: ""

databases:
  - name: saoluis-db
    plan: free
