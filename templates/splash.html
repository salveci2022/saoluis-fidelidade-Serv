<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0D1B3E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="São Luis">
<title>São Luis Fidelidade</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="icon" href="/static/icons/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Russo+One&family=Orbitron:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:#0D1B3E;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

/* BACKGROUND DECORATION */
.bg-circle1{
  position:absolute;width:400px;height:400px;
  border-radius:50%;
  border:60px solid rgba(220,30,40,.12);
  top:-100px;right:-100px;
  animation:rotate 20s linear infinite;
}
.bg-circle2{
  position:absolute;width:250px;height:250px;
  border-radius:50%;
  border:40px solid rgba(26,82,200,.1);
  bottom:-60px;left:-60px;
  animation:rotate 15s linear infinite reverse;
}
.bg-circle3{
  position:absolute;width:180px;height:180px;
  border-radius:50%;
  border:28px solid rgba(245,166,35,.08);
  top:30%;left:10%;
  animation:rotate 25s linear infinite;
}
@keyframes rotate{to{transform:rotate(360deg);}}

/* TOP STRIPE */
.top-stripe{
  position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,#DC1E28,#1A52C8,#DC1E28);
  background-size:200% 100%;
  animation:stripe 3s linear infinite;
}
@keyframes stripe{to{background-position:200% 0;}}

/* CONTENT */
.content{
  position:relative;z-index:2;
  text-align:center;
  padding:40px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* LOGO */
.logo-wrap{
  margin-bottom:32px;
  animation:fadeDown .8s ease both;
}
.logo-icon{
  width:120px;height:120px;
  background:#0D1B3E;
  border-radius:28px;
  border:3px solid rgba(220,30,40,.4);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  position:relative;
  overflow:hidden;
}
.logo-icon::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,#DC1E28,#1A52C8);
}
.logo-icon::after{
  content:'';position:absolute;
  left:0;top:0;bottom:0;width:5px;
  background:linear-gradient(180deg,#1A52C8,#DC1E28);
}
.logo-s{
  font-family:'Russo One',sans-serif;
  font-size:68px;color:#DC1E28;
  line-height:1;
  text-shadow:0 0 40px rgba(220,30,40,.3);
}
.logo-name{
  font-family:'Russo One',sans-serif;
  font-size:32px;color:#1A52C8;
  letter-spacing:3px;
  margin-bottom:6px;
}
.logo-tag{
  font-size:14px;color:rgba(255,255,255,.4);
  font-style:italic;
}

/* TAGLINE */
.tagline{
  margin-bottom:48px;
  animation:fadeUp .8s ease .2s both;
}
.tagline-main{
  font-size:22px;font-weight:900;
  color:white;
  margin-bottom:8px;
  line-height:1.3;
}
.tagline-main span{color:#F5A623;}
.tagline-sub{
  font-size:14px;color:rgba(255,255,255,.45);
  line-height:1.5;
  max-width:280px;
}

/* BUTTONS */
.buttons{
  width:100%;max-width:320px;
  display:flex;flex-direction:column;
  gap:12px;
  animation:fadeUp .8s ease .4s both;
  margin-bottom:32px;
}
.btn-cliente{
  padding:18px;border:none;border-radius:16px;
  background:linear-gradient(90deg,#DC1E28,#1A52C8);
  color:white;font-family:'Nunito',sans-serif;
  font-size:17px;font-weight:900;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform .15s,opacity .15s;
  box-shadow:0 4px 20px rgba(220,30,40,.3);
}
.btn-cliente:active{transform:scale(.97);opacity:.9;}
.btn-dono{
  padding:16px;border:2px solid rgba(255,255,255,.2);
  border-radius:16px;background:rgba(255,255,255,.06);
  color:white;font-family:'Nunito',sans-serif;
  font-size:16px;font-weight:900;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .15s;
}
.btn-dono:active{background:rgba(255,255,255,.12);}
.btn-terminal{
  padding:14px;border:none;border-radius:14px;
  background:rgba(245,166,35,.15);
  border:1px solid rgba(245,166,35,.3);
  color:#F5A623;font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:800;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
}
.btn-terminal:active{background:rgba(245,166,35,.25);}
.btn-icon{font-size:20px;}

/* FEATURES */
.features{
  display:flex;gap:20px;
  animation:fadeUp .8s ease .6s both;
  margin-bottom:24px;
}
.feat{text-align:center;}
.feat-icon{font-size:24px;margin-bottom:4px;}
.feat-txt{font-size:11px;color:rgba(255,255,255,.35);font-weight:700;}

/* FOOTER */
.footer{
  position:absolute;bottom:20px;
  font-size:11px;color:rgba(255,255,255,.2);
  text-align:center;
  animation:fadeUp .8s ease .8s both;
}

/* ANIMATIONS */
@keyframes fadeDown{
  from{opacity:0;transform:translateY(-30px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* PWA INSTALL BANNER */
.install-banner{
  position:absolute;bottom:60px;left:16px;right:16px;
  background:rgba(26,82,200,.9);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:12px 16px;
  display:none;align-items:center;gap:12px;
  animation:fadeUp .5s ease both;
  z-index:10;
}
.install-banner.show{display:flex;}
.ib-text{flex:1;font-size:13px;color:white;font-weight:700;}
.ib-btn{background:#F5A623;color:#0D1B3E;border:none;border-radius:8px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;cursor:pointer;}
.ib-close{color:rgba(255,255,255,.5);background:none;border:none;font-size:18px;cursor:pointer;padding:4px;}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-circle1"></div>
<div class="bg-circle2"></div>
<div class="bg-circle3"></div>
<div class="top-stripe"></div>

<div class="content">

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <span class="logo-s">S</span>
    </div>
    <div class="logo-name">ÃO LUIS</div>
    <div class="logo-tag">A sua escolha Feliz!</div>
  </div>

  <!-- TAGLINE -->
  <div class="tagline">
    <div class="tagline-main">Seu cartão de fidelidade<br><span>no celular</span></div>
    <div class="tagline-sub">Acumule pontos, ganhe descontos e receba promoções direto no WhatsApp</div>
  </div>

  <!-- BUTTONS -->
  <div class="buttons">
    <button class="btn-cliente" onclick="window.location.href='/cadastro'">
      <span class="btn-icon">🛒</span>
      Quero me cadastrar — é grátis!
    </button>
    <button class="btn-dono" onclick="window.location.href='/login'">
      <span class="btn-icon">🔑</span>
      Já tenho conta — Entrar
    </button>
    <button class="btn-terminal" onclick="window.location.href='/terminal'">
      <span class="btn-icon">📱</span>
      Terminal de pontos
    </button>
  </div>

  <!-- FEATURES -->
  <div class="features">
    <div class="feat">
      <div class="feat-icon">💳</div>
      <div class="feat-txt">Cartão digital</div>
    </div>
    <div class="feat">
      <div class="feat-icon">⭐</div>
      <div class="feat-txt">Até 10% OFF</div>
    </div>
    <div class="feat">
      <div class="feat-icon">📱</div>
      <div class="feat-txt">Via WhatsApp</div>
    </div>
    <div class="feat">
      <div class="feat-icon">🎁</div>
      <div class="feat-txt">Grátis</div>
    </div>
  </div>

</div>

<!-- INSTALL BANNER -->
<div class="install-banner" id="install-banner">
  <span style="font-size:24px;">📲</span>
  <div class="ib-text">Instale como app no seu celular!</div>
  <button class="ib-btn" onclick="installPWA()">Instalar</button>
  <button class="ib-close" onclick="document.getElementById('install-banner').classList.remove('show')">✕</button>
</div>

<div class="footer">
  Supermercado São Luis • (61) 3393-3233<br>
  QR 209 - Santa Maria, Brasília-DF
</div>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(()=>document.getElementById('install-banner').classList.add('show'), 2000);
});

function installPWA(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('show');
  });
}
</script>
</body>
</html>
